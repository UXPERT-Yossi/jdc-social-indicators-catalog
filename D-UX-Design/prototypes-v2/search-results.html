<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תוצאות חיפוש — קטלוג מדדים חברתיים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ul, ol { list-style: none; }
    button { cursor: pointer; font-family: inherit; }
    a { text-decoration: none; }

    :root {
      --primary:        #334155;
      --primary-hover:  #1E293B;
      --primary-light:  #F1F5F9;
      --primary-mid:    #64748B;

      --bg-page:        #F8FAFC;
      --bg-card:        #FFFFFF;

      --border:         #E2E8F0;
      --border-strong:  #CBD5E1;

      --text-primary:   #0F172A;
      --text-secondary: #475569;
      --text-muted:     #94A3B8;
      --text-inverse:   #FFFFFF;

      --success:        #475569;

      /* domain colors — wireframe grays */
      --d-welfare:   #475569;
      --d-edu:       #64748B;
      --d-employ:    #334155;
      --d-social:    #475569;
      --d-resilience:#475569;
      --d-early:     #64748B;
      --d-health:    #334155;

      /* badge type colors — wireframe grays */
      --t-outcome:   #334155;
      --t-output:    #475569;
      --t-input:     #64748B;
      --t-impact:    #1E293B;

      --font: 'Heebo', 'Assistant', sans-serif;

      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   12px;
      --radius-xl:   16px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
    }

    html, body {
      height: 100%;
      margin: 0;
    }
    html {
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.65;
      color: var(--text-primary);
      background: var(--bg-page);
      -webkit-font-smoothing: antialiased;
    }
    /* App-shell layout: viewport-sized body, no page-level scroll. Header
       sticks to top via flex (no scroll), cards scroll inside .cards-col only. */
    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .global-nav, .search-header { flex-shrink: 0; }

    /* ─── BREADCRUMB (in-row inside .search-header-inner) ─────────────
       Renders only when arriving from the browse flow (?from=browse).
       The <nav> keeps its `hidden` attribute by default; JS removes it
       when the URL says from=browse. Otherwise the whole .search-header
       collapses to zero visible content (no CLS since nothing was there). */
    .breadcrumb-bar {
      /* No background / border / padding here — those come from .search-header.
         Just enough to lay out as an inline-flex item next to the toggle. */
      display: inline-flex;
      align-items: center;
    }
    .breadcrumb-list {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .breadcrumb-list li {
      display: flex;
      align-items: center;
      color: var(--text-secondary);
    }
    .breadcrumb-list a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: var(--radius-md);
      transition: color .15s, background .15s;
    }
    .breadcrumb-list a:hover {
      color: var(--primary);
      background: var(--bg-page);
    }
    .breadcrumb-list .crumb-sep {
      color: var(--text-muted);
      font-size: 12px;
      padding-inline: 2px;
      user-select: none;
    }
    .breadcrumb-list [aria-current="page"] {
      color: var(--text-primary);
      font-weight: 600;
      padding: 3px 8px;
    }

    /* ─── ICON HELPER ─── */
    .icon { width: 16px; height: 16px; flex-shrink: 0; }
    .icon-md { width: 20px; height: 20px; }

    /* ─── NAV ─── */
    .global-nav {
      position: sticky;
      inset-block-start: 0;
      z-index: 100;
      background: var(--bg-card);
      border-block-end: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .global-nav-inner {
      max-width: 1280px;
      margin-inline: auto;
      padding-inline: 32px;
      padding-block: 14px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-logo-img { height: 18px; width: auto; display: block; }
    .nav-logo-text { font-weight: 700; color: var(--primary); }
    .nav-links {
      display: flex;
      gap: 4px;
    }
    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: var(--radius-md);
      transition: all .15s;
    }
    .nav-links a:hover { background: var(--bg-page); color: var(--text-primary); }
    .nav-links a[aria-current="page"] {
      color: var(--primary);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
    }
    .nav-search {
      position: relative;
      display: flex;
      align-items: center;
      width: 320px;
      max-width: 360px;
      min-width: 200px;
      margin-inline-start: auto;
    }
    .nav-search-icon {
      position: absolute;
      inset-inline-end: 12px;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .nav-search-input {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 14px;
      padding-inline-end: 36px;
      background: var(--bg-page);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      transition: border-color .15s, background .15s;
    }
    .nav-search-input::placeholder { color: var(--text-muted); }
    .nav-search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--bg-card);
    }

    /* ─── SEARCH HEADER ───
       Contains ONLY the ?from=browse breadcrumb. When the breadcrumb is
       hidden (the common case), the whole header collapses to zero height
       via :has() — no empty white bar. When JS unhides the breadcrumb
       (on ?from=browse), the padding and border return. */
    .search-header {
      background: var(--bg-card);
      border-block-end: 1px solid var(--border);
      padding-block: 20px;
      padding-inline: 32px;
    }
    .search-header:has(> .search-header-inner > .breadcrumb-bar[hidden]) {
      display: none;
    }
    .search-header-inner {
      max-width: 1280px;
      margin-inline: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: transparent;
      white-space: nowrap;
      transition: all .15s;
    }
    .back-btn:hover { background: var(--bg-page); color: var(--text-primary); border-color: var(--border-strong); }
    .back-btn svg { transform: scaleX(-1); } /* RTL arrow flip */

    .search-field-wrap {
      position: relative;
      flex: 1;
      max-width: 640px;
    }
    .search-field {
      width: 100%;
      box-sizing: border-box;
      padding-block: 10px;
      padding-inline-start: 42px;
      padding-inline-end: 16px;        /* No internal button → simple end padding */
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-full);
      font-family: var(--font);
      font-size: 15px;
      background: var(--bg-page);
      outline: none;
      color: var(--text-primary);
      transition: border-color .2s, box-shadow .2s;
    }
    .search-field:focus {
      background: var(--bg-card);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(51,65,85,.1);
    }
    .search-field-icon {
      position: absolute;
      inset-block-start: 50%;
      inset-inline-start: 14px;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-field-btn {
      position: absolute;
      inset-block-start: 50%;
      inset-inline-end: 6px;
      transform: translateY(-50%);
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      transition: background .15s;
    }
    .search-field-btn:hover { background: var(--primary-hover); }

    /* Result-count summary inside .results-toolbar — sits at start (RIGHT in
       RTL). Sibling .sort-label has margin-inline-start:auto to push the sort
       group to the end (LEFT in RTL). */
    .search-count {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .search-count strong { color: var(--text-primary); font-weight: 700; }

    /* Active filters bar */
    .active-filters-bar {
      background: var(--primary-light);
      border-block-end: 1px solid #BAE6FD;
      padding-block: 10px;
      padding-inline: 32px;
      display: none; /* shown via JS when filters active */
    }
    .active-filters-bar.visible { display: block; }
    .active-filters-inner {
      max-width: 1280px;
      margin-inline: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .active-filters-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      background: #fff;
      border: 1px solid #BAE6FD;
      border-radius: var(--radius-full);
      padding: 3px 10px;
    }
    .filter-pill-remove {
      background: none;
      border: none;
      padding: 0;
      font-size: 14px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
    }
    .filter-pill-remove:hover { color: var(--primary); }
    .clear-all-btn {
      margin-inline-start: auto;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ─── MAIN LAYOUT ─── */
    /* App-shell main: takes the remaining viewport height (flex:1 + min-height:0).
       grid-template-rows: last row is 1fr so the cards area absorbs remaining
       space — .cards-col then overflows internally instead of pushing the page. */
    .search-layout {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 1280px;
      margin-inline: auto;
      box-sizing: border-box;
      padding-inline: 32px;
      padding-block: 18px;
      display: grid;
      grid-template-columns: 264px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "filter   toolbar"
        "filter   cards";
      column-gap: 28px;
      row-gap: 16px;
      align-items: start;
    }
    .results-toolbar { grid-area: toolbar; }
    /* min-height:0 + overflow-y:auto = cards scroll INSIDE the column only. */
    .cards-col       { grid-area: cards; min-width: 0; min-height: 0; height: 100%; overflow-y: auto; padding-inline-end: 4px; }
    .filter-col      { grid-area: filter; max-height: 100%; overflow-y: auto; }

    .results-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      /* spacing managed by parent grid row-gap — no margin needed here */
    }
    .sort-label {
      font-size: 13px;
      color: var(--text-muted);
      /* Push the sort group to the inline-end of the toolbar = LEFT edge of
         the cards column in RTL. Matches the same pattern in browse.html. */
      margin-inline-start: auto;
    }
    .sort-select {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 5px 10px;
      background: var(--bg-card);
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus { border-color: var(--primary); }

    /* ─── RESULT CARD ─── */
    .result-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .result-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 20px 24px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
    }
    .result-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
    }
    .result-card.in-comparison {
      border-color: var(--primary);
      background: #F0F9FF;
    }

    .result-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-block-end: 10px;
    }
    .result-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }

    /* badge base */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }
    .badge-type-outcome  { background: #DCFCE7; color: var(--t-outcome); }
    .badge-type-output   { background: var(--primary-light); color: var(--t-output); }
    .badge-type-input    { background: #FEF3C7; color: var(--t-input); }
    .badge-type-impact   { background: #F3E8FF; color: var(--t-impact); }
    .badge-domain {
      background: color-mix(in srgb, var(--domain-color, #7C3AED) 12%, white);
      color: var(--domain-color, #7C3AED);
      border: 1px solid color-mix(in srgb, var(--domain-color, #7C3AED) 25%, white);
    }

    .compare-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-light);
      border: 1px solid #BAE6FD;
      border-radius: var(--radius-full);
      padding: 5px 12px;
      transition: all .15s;
      white-space: nowrap;
    }
    .compare-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .compare-btn.added { background: var(--primary); color: #fff; border-color: var(--primary); }
    .compare-btn.added:hover { background: #0284C7; }

    .result-title-link {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-block-end: 6px;
      transition: color .15s;
      line-height: 1.35;
    }
    .result-title-link:hover { color: var(--primary); }

    .result-snippet {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-block-end: 10px;
    }

    /* Rationale snippet — the "Michal moment" */
    .result-rationale {
      border-inline-start: 3px solid var(--primary);
      padding-inline-start: 10px;
      padding-block: 6px;
      background: #F0F9FF;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin-block-end: 12px;
    }
    .result-rationale-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--primary);
      margin-block-end: 2px;
    }
    .result-rationale-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .result-meta {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .result-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .result-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-block-start: 14px;
      padding-block-start: 12px;
      border-block-start: 1px solid var(--border);
    }
    .open-card-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap .15s;
    }
    .open-card-link svg { transform: scaleX(-1); } /* RTL arrow */
    .open-card-link:hover { gap: 8px; }

    .programs-used {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── FILTER SIDEBAR ─── */
    .filter-col {
      position: sticky;
      inset-block-start: 84px; /* aligned with browse.html .left-panel */
    }
    .filter-panel {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    .filter-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-block-end: 1px solid var(--border);
    }
    .filter-panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .filter-reset-btn {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color .15s;
    }
    .filter-reset-btn:hover { color: var(--primary); }

    .filter-group {
      padding: 14px 18px;
      border-block-end: 1px solid var(--border);
    }
    .filter-group:last-child { border-block-end: none; }
    .filter-group-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-block-end: 10px;
    }

    /* Checkbox filter items */
    .filter-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
    }
    .filter-item input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border-strong);
      border-radius: 4px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: all .15s;
    }
    .filter-item input[type="checkbox"]:checked {
      background: var(--primary);
      border-color: var(--primary);
    }
    .filter-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      inset-block-start: 2px;
      inset-inline-start: 4px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-block-start: none;
      border-inline-start: none;
      transform: rotate(45deg);
    }
    .filter-item-label {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
    }
    .filter-item-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-page);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 1px 7px;
    }

    /* Tag groups (accordion) — copied from browse.html so the panel structure
       is identical across screens. Open/closed by data-open attribute. */
    .tag-group { margin-block-end: 8px; }
    .tag-group:last-child { margin-block-end: 0; }
    .tag-group-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 6px 0;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: start;
    }
    .tag-group-toggle:hover { color: var(--text-primary); }
    .tag-group-toggle-icon {
      font-size: 11px;
      color: var(--text-muted);
      transition: transform .18s;
    }
    .tag-group[data-open="true"] .tag-group-toggle-icon { transform: rotate(-90deg); }
    .tag-group-items {
      display: none;
      flex-direction: column;
      gap: 4px;
      padding-block-start: 4px;
      padding-inline-start: 4px;
    }
    .tag-group[data-open="true"] .tag-group-items { display: flex; }

    /* Domain chips */
    .domain-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .domain-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all .15s;
    }
    .domain-chip .chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .domain-chip:not(.active) {
      background: var(--bg-page);
      border-color: var(--border);
      color: var(--text-secondary);
    }
    .domain-chip:not(.active):hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    .domain-chip.active {
      background: color-mix(in srgb, var(--chip-color) 12%, white);
      border-color: color-mix(in srgb, var(--chip-color) 35%, white);
      color: var(--chip-color);
      font-weight: 600;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding-block: 64px;
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-icon {
      width: 48px;
      height: 48px;
      color: var(--text-muted);
      margin-inline: auto;
      margin-block-end: 16px;
    }
    .empty-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-block-end: 8px;
    }

      stage: 'evaluation',
      snippet: 'מידת השינוי במצב הכלכלי של ילדים לעומת הוריהם — מדד אימפקט ארוך-טווח, מחושב ממעקב אחר קבוצות גיל לאורך שנים.',
      rationale: 'מעריכים השפעה מערכתית ארוכת-טווח על פערים מבניים — פחות מתאים לתכניות קצרות-מועד (פחות מ-5 שנים).',
      frequency: 'רב-שנתי', source: 'admin',
      tags: ['young-adults','mobility','poverty','periphery']
    }
  ];

  // Label maps — code values on the data + Hebrew display via this lookup.
  // Mirror of the maps in browse.html (single source of truth for filter labels).
  const STAGE_LABEL  = { evaluation: 'הערכה', implementation: 'יישום', planning: 'תכנון' };
  const SOURCE_LABEL = {
    admin: 'נתוני מינהל',
    survey: 'שאלון',
    'social-security': 'ביטוח לאומי'
  };
  const DOMAIN_LABEL = {
    welfare:    'רווחה כלכלית',
    edu:        'חינוך',
    social:     'רווחה חברתית',
    resilience: 'חוסן קהילתי',
    employ:     'תעסוקה'
  };

  // Map free-text frequency to one of three buckets — same logic as browse.html
  // so the "תדירות" filter behaves identically across screens.
  function freqBucket(freqStr) {
    if (!freqStr) return null;
    if (/חצי|רבעוני/.test(freqStr)) return 'semi';
    if (/רב-?שנתי|חמש/.test(freqStr)) return 'multi';
    if (/שנתי/.test(freqStr)) return 'annual';
    return 'annual';
  }

  // ─── Render cards via shared ICCard component.
  // ICCard expects display strings, so map source code → Hebrew label.
  // dataset attrs carry the CODES for filter matching.
  function renderCards() {
    const list = document.getElementById('result-list');
    if (!list) return;
    list.textContent = '';
    SEARCH_INDICATORS.forEach(ind => {
      const cardData = Object.assign({}, ind, {
        source: SOURCE_LABEL[ind.source] || ind.source   /* code → Hebrew for card meta */
      });
      const card = window.ICCard.render(cardData);
      card.dataset.type = ind.type;
      card.dataset.frequency = freqBucket(ind.frequency);
      card.dataset.stage = ind.stage;
      card.dataset.source = ind.source;
      card.dataset.domain = ind.domain;
      card.dataset.tags = (ind.tags || []).join(' ');
      list.appendChild(card);
    });
  }


  // ─── Comparison tray ─────────────────────────────────────────────────
  const MAX_COMPARE = (window.ICCard && window.ICCard.compare.MAX) || 3;

  function getCompareItems() {
    return (window.ICCard && window.ICCard.compare.items()) || [];
  }

  function renderTray() {
    const tray = document.getElementById('comparison-tray');
    const itemsEl = document.getElementById('tray-items');
    const compareBtn = document.getElementById('tray-compare-btn');
    if (!tray || !itemsEl || !compareBtn) return;

    const items = getCompareItems();
    itemsEl.textContent = '';

    items.forEach(item => {
      const slot = document.createElement('div');
      slot.className = 'tray-item';
      const name = document.createElement('span');
      name.className = 'tray-item-name';
      name.textContent = item.name;
      const removeBtn = document.createElement('button');
      removeBtn.className = 'tray-item-remove';
      removeBtn.setAttribute('aria-label', 'הסר ' + item.name + ' מההשוואה');
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => window.ICCard.compare.remove(item.id));
      slot.appendChild(name);
      slot.appendChild(removeBtn);
      itemsEl.appendChild(slot);
    });

    const emptyCount = Math.max(0, MAX_COMPARE - items.length);
    for (let i = 0; i < emptyCount; i++) {
      const slot = document.createElement('div');
      slot.className = 'tray-slot-empty';
      slot.textContent = 'הוסף מדד';
      itemsEl.appendChild(slot);
    }

    tray.classList.toggle('visible', items.length > 0);
    compareBtn.disabled = items.length < 2;
  }

  function clearComparison() {
    if (window.ICCard) window.ICCard.compare.clear();
  }

  function openComparison() {
    if (getCompareItems().length >= 2) {
      window.location.href = 'comparison.html';
    }
  }


  // ─── Active filters state ─────────────────────────────────────────────
  // Mirror browse.html + adds `domain` (only meaningful when searching across
  // domains — browse doesn't need it since the user drilled INTO a domain).
  const activeFilters = {
    type: new Set(),
    frequency: new Set(),
    stage: new Set(),
    source: new Set(),
    domain: new Set(),
    tags: new Set()
  };

  function applyFilter(dimension, value, checked) {
    if (checked) activeFilters[dimension].add(value);
    else activeFilters[dimension].delete(value);
    updateResults();
  }

  function updateResults() {
    const cards = document.querySelectorAll('.ic-card');
    let visible = 0;

    cards.forEach(card => {
      const type   = card.dataset.type;
      const freq   = card.dataset.frequency;
      const stage  = card.dataset.stage;
      const source = card.dataset.source;
      const domain = card.dataset.domain;
      const tagsList = (card.dataset.tags || '').split(' ').filter(Boolean);

      const typeOk   = activeFilters.type.size   === 0 || activeFilters.type.has(type);
      const freqOk   = activeFilters.frequency.size === 0 || activeFilters.frequency.has(freq);
      const stageOk  = activeFilters.stage.size  === 0 || activeFilters.stage.has(stage);
      const sourceOk = activeFilters.source.size === 0 || activeFilters.source.has(source);
      const domainOk = activeFilters.domain.size === 0 || activeFilters.domain.has(domain);
      let tagsOk = activeFilters.tags.size === 0;
      if (!tagsOk) {
        for (const t of activeFilters.tags) {
          if (tagsList.indexOf(t) !== -1) { tagsOk = true; break; }
        }
      }

      const show = typeOk && freqOk && stageOk && sourceOk && domainOk && tagsOk;
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    const countEl = document.getElementById('result-count');
    if (countEl) countEl.textContent = visible;
    const emptyEl = document.getElementById('empty-state');
    if (emptyEl) emptyEl.classList.toggle('visible', visible === 0);
  }

  function clearAllFilters() {
    Object.keys(activeFilters).forEach(k => activeFilters[k].clear());
    renderFilterPanel();
    updateResults();
  }

  function typeLabel(v) { return { outcome:'תוצאה', output:'תפוקה', impact:'אימפקט', input:'תשומה' }[v] || v; }
  function freqLabel(v) { return { annual:'שנתי', semi:'חצי-שנתי / רבעוני', multi:'רב-שנתי' }[v] || v; }

  // ─── Filter panel renderer (identical shape to browse.html leaf view) ──
  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (v == null) continue;
        if (k === 'class')      e.className = v;
        else if (k === 'text')  e.textContent = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else                    e.setAttribute(k, v);
      }
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      if (typeof c === 'string')  e.appendChild(document.createTextNode(c));
      else if (c instanceof Node) e.appendChild(c);
    }
    return e;
  }
  function buildCheckboxGroup(title, options, dimension) {
    const items = el('div', { class: 'filter-items', role: 'group', 'aria-label': 'סינון לפי ' + title });
    options.forEach(opt => {
      const cb = el('input', { type: 'checkbox', value: opt.value });
      cb.checked = activeFilters[dimension] && activeFilters[dimension].has(opt.value);
      cb.addEventListener('change', () => applyFilter(dimension, opt.value, cb.checked));
      items.appendChild(el('label', { class: 'filter-item' },
        cb,
        el('span', { class: 'filter-item-label', text: opt.label })
      ));
    });
    return el('div', { class: 'filter-group' },
      el('p', { class: 'filter-group-title', text: title }),
      items
    );
  }

  /* Semantic-tag checkbox group: every tag toggles inside activeFilters.tags
     (single flat Set — not a per-group dimension). Same wiring as the old
     TagBar's onToggle, just rendered as vertical checkboxes inside the
     filter panel instead of horizontal category pills at the top. */
  function buildTagCheckboxGroup(title, tagList) {
    const items = el('div', { class: 'filter-items', role: 'group', 'aria-label': 'סינון לפי ' + title });
    tagList.forEach(tag => {
      const cb = el('input', { type: 'checkbox', value: tag.id });
      cb.checked = activeFilters.tags.has(tag.id);
      cb.addEventListener('change', () => {
        if (cb.checked) activeFilters.tags.add(tag.id);
        else            activeFilters.tags.delete(tag.id);
        updateResults();
      });
      items.appendChild(el('label', { class: 'filter-item' },
        cb,
        el('span', { class: 'filter-item-label', text: tag.label })
      ));
    });
    return el('div', { class: 'filter-group' },
      el('p', { class: 'filter-group-title', text: title }),
      items
    );
  }
  function renderFilterPanel() {
    const panel = document.getElementById('filter-panel');
    if (!panel) return;
    panel.textContent = '';

    panel.appendChild(el('div', { class: 'filter-panel-header' },
      el('h2', { class: 'filter-panel-title', text: 'סינון' }),
      el('button', { class: 'filter-reset-btn', type: 'button', onclick: () => clearAllFilters() }, 'נקה הכל')
    ));

    panel.appendChild(buildCheckboxGroup('סוג מדד', [
      { value: 'outcome', label: 'תוצאה' },
      { value: 'output',  label: 'תפוקה' },
      { value: 'impact',  label: 'אימפקט' },
      { value: 'input',   label: 'תשומה' }
    ], 'type'));

    panel.appendChild(buildCheckboxGroup('תדירות', [
      { value: 'annual', label: 'שנתי' },
      { value: 'semi',   label: 'חצי-שנתי / רבעוני' },
      { value: 'multi',  label: 'רב-שנתי' }
    ], 'frequency'));

    panel.appendChild(buildCheckboxGroup('שלב בתכנית', [
      { value: 'planning',       label: STAGE_LABEL.planning },
      { value: 'implementation', label: STAGE_LABEL.implementation },
      { value: 'evaluation',     label: STAGE_LABEL.evaluation }
    ], 'stage'));

    /* Domain filter — present here (search is cross-domain) but NOT in browse
       (user is already inside a domain via cube drill-down). */
    panel.appendChild(buildCheckboxGroup('תחום חיים', [
      { value: 'welfare',    label: DOMAIN_LABEL.welfare },
      { value: 'edu',        label: DOMAIN_LABEL.edu },
      { value: 'social',     label: DOMAIN_LABEL.social },
      { value: 'resilience', label: DOMAIN_LABEL.resilience },
      { value: 'employ',     label: DOMAIN_LABEL.employ }
    ], 'domain'));

    panel.appendChild(buildCheckboxGroup('כלי מדידה', [
      { value: 'admin',           label: SOURCE_LABEL.admin },
      { value: 'survey',          label: SOURCE_LABEL.survey },
      { value: 'social-security', label: SOURCE_LABEL['social-security'] }
    ], 'source'));

    /* Semantic-tag groups — mounted INSIDE the filter panel (formerly a
       separate horizontal TagBar above results). Order intentional:
       ages → populations → cross-cutting themes → status. The `geo` group
       ("אזור גיאוגרפי") is intentionally excluded — the filter was removed
       per product decision, though geo tags remain in TAGS_REGISTRY so
       cards can still resolve labels (e.g., "פריפריה") via TAG_LOOKUP. */
    const TAG_FILTER_ORDER = ['ages', 'population', 'themes', 'status'];
    TAG_FILTER_ORDER.forEach(groupKey => {
      const g = TAGS_REGISTRY[groupKey];
      if (!g) return;
      panel.appendChild(buildTagCheckboxGroup(g.label, g.tags));
    });
  }

  /* doSearch() removed along with the big in-page search field.
     The small nav-search form (action="search-results.html" method="get")
     handles new searches — Enter submits the form, which navigates to
     search-results.html?q=<value> natively. No JS needed. */

  /* Search-input sync moved out to the shared asset: assets/search-sync.js.
     That script handles ALL search-input selectors on every page from a
     single point — and crucially, it skips the sync when ?from=browse is
     present (the breadcrumb owns the context in that flow, the search
     field stays empty for a fresh query). */

  // ─── Sort ───────────────────────────────────────────────────────────
  function sortResults(val) {
    // Visual prototype — just announce
    console.log('Sort by:', val);
  }

  // Tag bar removed: semantic tags now render as checkbox groups inside the
  // filter panel (see buildTagCheckboxGroup + TAG_FILTER_ORDER above).
  // View-toggle removed: cards are the sole view for search results.

  /* ─── BREADCRUMB renderer ────────────────────────────────────────────
     Reads ?from=browse + ?dim=<id> + ?q=<sub-domain-name> from the URL and
     paints a back-trail crumb: עיון › <dim label> › <sub-domain name>.
     The dim label is looked up in DIM_LABEL (mirror of browse.html's TREE
     ids → names — duplicated here, same pattern as TAGS_REGISTRY). */
  const DIM_LABEL = {
    'dim-economic':  'ביטחון כלכלי',
    'dim-education': 'חינוך ופיתוח',
    'dim-wellbeing': 'רווחה נפשית וחברתית',
    'dim-health':    'בריאות',
    'dim-belonging': 'שייכות ומעורבות'
  };

  (function renderBreadcrumb() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('from') !== 'browse') return;   /* not from browse → no crumb */

    const dim = params.get('dim');
    const q   = params.get('q');
    const bar  = document.getElementById('breadcrumb-bar');
    const list = document.getElementById('breadcrumb-list');
    if (!bar || !list) return;

    list.textContent = '';

    /* Tiny DOM helpers — keep this IIFE self-contained, don't depend on
       the file-level `el()` helper that may not exist at this point. */
    const link = (label, href) => {
      const li = document.createElement('li');
      const a  = document.createElement('a');
      a.href = href;
      a.textContent = label;
      li.appendChild(a);
      return li;
    };
    const current = (label) => {
      const li = document.createElement('li');
      li.setAttribute('aria-current', 'page');
      li.textContent = label;
      return li;
    };
    const sep = () => {
      const li = document.createElement('li');
      li.className = 'crumb-sep';
      li.setAttribute('aria-hidden', 'true');
      li.textContent = '›';
      return li;
    };

    /* Crumb 1: עיון → browse.html root (cube grid). Always present. */
    list.appendChild(link('עיון', 'browse.html'));

    /* Crumb 2: dimension label → also browse.html (no focused-dim URL exists
       yet; clicking lands at the cube grid where the user can re-hover). */
    if (dim && DIM_LABEL[dim]) {
      list.appendChild(sep());
      list.appendChild(link(DIM_LABEL[dim], 'browse.html'));
    }

    /* Crumb 3: current sub-domain — non-clickable (you're here). */
    if (q) {
      list.appendChild(sep());
      list.appendChild(current(q));
    }

    bar.hidden = false;
  })();

  // ─── Init ───────────────────────────────────────────────────────────
  renderFilterPanel();
  renderCards();
  renderTray();

  // Sync UI when the shared compare store changes (e.g., card clicked elsewhere).
  if (window.ICCard) {
    window.ICCard.compare.onChange(() => {
      renderCards();   // refresh selected-state on cards
      renderTray();    // refresh tray contents
      // Reapply filters since renderCards rebuilt the DOM
      applyAllFilters();
    });
  }

  // Helper to reapply current filters after re-rendering cards
  function applyAllFilters() {
    document.querySelectorAll('.ic-card').forEach(card => {
      let visible = true;
      ['type','stage','domain'].forEach(dim => {
        const set = activeFilters[dim];
        if (set && set.size > 0 && !set.has(card.dataset[dim])) visible = false;
      });
      card.style.display = visible ? '' : 'none';
    });
  }
</script>

<script src="assets/search-sync.js?v=2"></script>
<script src="assets/ai-fab.js?v=4"></script>
